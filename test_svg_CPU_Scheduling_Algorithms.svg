<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
    <rect x="20" y="20" width="560" height="360" fill="none" stroke="#ccc" stroke-width="2" rx="10" />
    <text x="30" y="50" font-size="24" font-family="Arial" fill="#666">CPU Scheduling Algorithms</text>
    <text x="30" y="80" font-size="18" font-family="Arial" fill="#666">DBMS (Database Management System)</text>

    <!-- First-Come-First-Served (FCFS) -->
    <rect x="20" y="120" width="180" height="100" fill="none" stroke="#f00" stroke-width="2" rx="10" />
    <text x="30" y="140" font-size="18" font-family="Arial" fill="#666">FCFS</text>
    <text x="30" y="160" font-size="14" font-family="Arial" fill="#666">Process 1</text>
    <text x="30" y="180" font-size="14" font-family="Arial" fill="#666">Process 2</text>
    <text x="30" y="200" font-size="14" font-family="Arial" fill="#666">Process 3</text>
    <text x="220" y="160" font-size="14" font-family="Arial" fill="#666">Time</text>
    <text x="220" y="180" font-size="14" font-family="Arial" fill="#666">5</text>
    <text x="220" y="200" font-size="14" font-family="Arial" fill="#666">10</text>
    <text x="220" y="180" font-size="14" font-family="Arial" fill="#666">+5</text>
    <line x1="220" y1="180" x2="420" y2="180" stroke="#f00" stroke-width="2" />
    <circle cx="420" cy="180" r="10" fill="#f00" />
    <line x1="420" y1="180" x2="420" y2="220" stroke="#f00" stroke-width="2" />
    <text x="420" y="220" font-size="14" font-family="Arial" fill="#666">5</text>

    <!-- Shortest Job First (SJF) -->
    <rect x="220" y="120" width="180" height="100" fill="none" stroke="#0f0" stroke-width="2" rx="10" />
    <text x="230" y="140" font-size="18" font-family="Arial" fill="#666">SJF</text>
    <text x="230" y="160" font-size="14" font-family="Arial" fill="#666">Process 1</text>
    <text x="230" y="180" font-size="14" font-family="Arial" fill="#666">Process 2</text>
    <text x="230" y="200" font-size="14" font-family="Arial" fill="#666">Process 3</text>
    <text x="430" y="160" font-size="14" font-family="Arial" fill="#666">Time</text>
    <text x="430" y="180" font-size="14" font-family="Arial" fill="#666">5</text>
    <text x="430" y="200" font-size="14" font-family="Arial" fill="#666">10</text>
    <text x="430" y="180" font-size="14" font-family="Arial" fill="#666">+5</text>
    <line x1="430" y1="180" x2="630" y2="180" stroke="#0f0" stroke-width="2" />
    <circle cx="630" cy="180" r="10" fill="#0f0" />
    <line x1="630" y1="180" x2="630" y2="220" stroke="#0f0" stroke-width="2" />
    <text x="630" y="220" font-size="14" font-family="Arial" fill="#666">3</text>

    <!-- Round Robin (RR) -->
    <rect x="440" y="120" width="180" height="100" fill="none" stroke="#00f" stroke-width="2" rx="10" />
    <text x="450" y="140" font-size="18" font-family="Arial" fill="#666">RR</text>
    <text x="450" y="160" font-size="14" font-family="Arial" fill="#666">Process 1</text>
    <text x="450" y="180" font-size="14" font-family="Arial" fill="#666">Process 2</text>
    <text x="450" y="200" font-size="14" font-family="Arial" fill="#666">Process 3</text>
    <text x="650" y="160" font-size="14" font-family="Arial" fill="#666">Time</text>
    <text x="650" y="180" font-size="14" font-family="Arial" fill="#666">5</text>
    <text x="650" y="200" font-size="14" font-family="Arial" fill="#666">10</text>
    <text x="650" y="180" font-size="14" font-family="Arial" fill="#666">+5</text>
    <line x1="650" y1="180" x2="750" y2="180" stroke="#00f" stroke-width="2" />
    <circle cx="750" cy="180" r="10" fill="#00f" />
    <line x1="750" y1="180" x2="750" y2="220" stroke="#00f" stroke-width="2" />
    <text x="750" y="220" font-size="14" font-family="Arial" fill="#666">2</text>

    <text x="30" y="320" font-size="18" font-family="Arial" fill="#666">CPU Utilization</text>
    <text x="30" y="340" font-size="14" font-family="Arial" fill="#666">FCFS: 50%</text>
    <text x="30" y="360" font-size="14" font-family="Arial" fill="#666">SJF: 66%</text>
    <text x="30" y="380" font-size="14" font-family="Arial" fill="#666">RR: 50%</text>
</svg>